# Release-gated production deploy.
#
# Flow: push a `vX.Y.Z` tag (or manually dispatch against one) -> validates the
# tag format -> builds+pushes versioned images to the GitHub Container Registry
# (ghcr.io) -> creates a GitHub Release for that tag -> triggers a Portainer
# stack webhook to redeploy. Regular pushes to `main` no longer trigger any
# build or deploy — only a properly formatted version tag does, and every such
# tag always gets a corresponding GitHub Release as part of this same run.
#
# What this workflow does NOT do:
#   - It does not manage the backend's runtime environment variables. Those are
#     injected into the running containers via a Docker Swarm secret
#     (`apartamentos_backend_env`, mounted at /run/secrets/backend.env) that is
#     created once, directly on the target node, out of band from CI/CD — see
#     DEPLOY_SECRET.md. This workflow never reads or writes that secret.
#   - It does not create the Portainer stack or its webhook. Both are one-time
#     manual setup steps in the Portainer UI (Stacks -> your stack -> Webhook):
#     Portainer generates the webhook URL, which then gets stored here as the
#     PORTAINER_WEBHOOK_URL repo secret. GitHub Actions has no way to create
#     that webhook itself.
#   - It relies on the stack's compose file using the `:latest` tag (the
#     default in docker-compose.yml) and on Portainer re-pulling images when
#     the webhook fires. If the Portainer stack should instead run a pinned
#     version, set the stack's BACKEND_IMAGE_TAG / FRONTEND_IMAGE_TAG
#     environment variables in Portainer to the released tag (e.g. `v1.4.2`)
#     — the webhook alone does not change which tag the stack is pinned to.
#   - The only repo secret this workflow requires is PORTAINER_WEBHOOK_URL.
#     (VITE_GOOGLE_CLIENT_ID / VITE_OAUTH_PROD_URL were removed — the frontend
#     never reads them; Google OAuth is entirely backend-driven.)
#   - GHCR packages are private by default. For Portainer to pull them, pick one:
#       (a) make the package public from its GitHub package settings after the
#           first push (Settings -> Packages -> apartamentos-backend/-frontend
#           -> Change visibility) — simplest, no Portainer-side config needed; or
#       (b) add a registry credential in Portainer (Registries -> Add registry,
#           ghcr.io, using a GitHub Personal Access Token with `read:packages`
#           scope as the password) if the packages should stay private.
#     This workflow doesn't decide between them — pick whichever fits.

name: Deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

env:
  BACKEND_IMAGE: ghcr.io/fer336/apartamentos-backend
  FRONTEND_IMAGE: ghcr.io/fer336/apartamentos-frontend

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Ref '${{ github.ref_name }}' does not match the required release tag format vX.Y.Z (e.g. v1.4.2). Refusing to build or deploy."
            exit 1
          fi
          echo "Tag '${{ github.ref_name }}' is a valid release version."

  build-backend:
    needs: [validate-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}

  build-frontend:
    needs: [validate-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}
          build-args: |
            VITE_BACKEND_URL=

  release:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

  deploy:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer stack redeploy
        run: curl -fsS -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
